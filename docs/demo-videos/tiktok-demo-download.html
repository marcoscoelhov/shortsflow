<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShortsFlow | TikTok Developer Review Demo</title>
    <link rel="icon" href="../shortsflow-mark-1024.png" type="image/png">
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: #17171b;
        --ink: #f6f1f0;
        --muted: #b8a5a2;
        --line: #343035;
        --accent: #ff5540;
        --accent-soft: #ffb4a8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.55;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--ink);
        text-decoration: none;
      }

      .brand img {
        width: 42px;
        height: 42px;
      }

      h1 {
        margin: 36px 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.08;
      }

      p {
        color: var(--muted);
        max-width: 72ch;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        margin-top: 24px;
        background: #050506;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      a {
        color: var(--accent-soft);
        font-weight: 700;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 16px;
        color: var(--ink);
        text-decoration: none;
      }

      .button.primary {
        border-color: transparent;
        background: var(--accent);
        color: #161111;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="../index.html">
        <img src="../shortsflow-mark-1024.png" width="42" height="42" alt="">
        <strong>ShortsFlow</strong>
      </a>
      <h1>TikTok Developer Review Demo</h1>
      <p>
        This sandbox review video demonstrates the complete ShortsFlow
        integration flow with TikTok: OAuth context, approved video package,
        TikTok publication queue, upload request, and status tracking.
      </p>
      <video controls preload="metadata" src="./tiktok-developer-review-demo.mp4"></video>
      <div class="actions">
        <a class="button primary" href="./tiktok-developer-review-demo.mp4" download>Download MP4</a>
        <a class="button" href="../index.html">Back to ShortsFlow</a>
      </div>
    </main>
  </body>
</html>
